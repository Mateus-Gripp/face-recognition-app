version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/dev.db
      - NODE_ENV=production
      - FACE_RECOGNITION_THRESHOLD=0.5
    volumes:
      - ./apps/api/uploads:/app/uploads
      - ./apps/api/data:/app/data
    command: npm start

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - api
